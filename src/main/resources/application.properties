# Default sender for outgoing mail.
quarkus.mailer.from=no-reply@jrobertgardzinski.com

# In dev, don't actually send — log the mail instead. In tests, MockMailbox intercepts sends.
%dev.quarkus.mailer.mock=true

# The REST boundary sends at most this many mails per minute (429 above it; 0 disables) — one
# runaway caller must not flood the SMTP server through us.
mail.rate-limit.per-minute=${MAIL_RATE_LIMIT_PER_MINUTE:120}
%test.mail.rate-limit.per-minute=10000

# Shared secret required in the X-Api-Key header; only trusted services may send (not an open relay).
mail.api-key=${MAIL_API_KEY:changeme}
%dev.mail.api-key=dev-key
%test.mail.api-key=test-key

# Production SMTP (host/port/credentials) is configured via env vars at deploy time, e.g.:
#   QUARKUS_MAILER_HOST, QUARKUS_MAILER_PORT, QUARKUS_MAILER_USERNAME, QUARKUS_MAILER_PASSWORD

# Mail requests arrive asynchronously from Kafka (microservice-security's outbox publishes them);
# the broker comes from the environment. Dev Services stay off — the compose stack provides Kafka.
quarkus.devservices.enabled=false
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.mail-requests.connector=smallrye-kafka
mp.messaging.incoming.mail-requests.topic=mail-requests
mp.messaging.incoming.mail-requests.auto.offset.reset=earliest
# A send that keeps failing is parked here with its failure attached (see MailRequestsConsumer).
mp.messaging.outgoing.mail-requests-dlq.connector=smallrye-kafka
mp.messaging.outgoing.mail-requests-dlq.topic=mail-requests-dlq
# In tests the channels run on the in-memory connector — no broker, no Docker.
%test.mp.messaging.incoming.mail-requests.connector=smallrye-in-memory
%test.mp.messaging.outgoing.mail-requests-dlq.connector=smallrye-in-memory
