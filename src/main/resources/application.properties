# Default sender for outgoing mail.
quarkus.mailer.from=no-reply@jrobertgardzinski.com

# In dev, don't actually send — log the mail instead. In tests, MockMailbox intercepts sends.
%dev.quarkus.mailer.mock=true

# Production SMTP (host/port/credentials) is configured via env vars at deploy time, e.g.:
#   QUARKUS_MAILER_HOST, QUARKUS_MAILER_PORT, QUARKUS_MAILER_USERNAME, QUARKUS_MAILER_PASSWORD
